apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: faithfit
spec:
  replicas: 2
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: ghcr.io/faithfit/auth:latest
          ports: [{ containerPort: 4000 }]
          envFrom:
            - secretRef: { name: faithfit-secrets }
          readinessProbe: { httpGet: { path: /health, port: 4000 }, initialDelaySeconds: 5 }
          livenessProbe: { httpGet: { path: /health, port: 4000 }, initialDelaySeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: auth, namespace: faithfit }
spec:
  selector: { app: auth }
  ports: [{ port: 80, targetPort: 4000 }]
