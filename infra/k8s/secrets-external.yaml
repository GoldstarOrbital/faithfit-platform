# Example ExternalSecret (requires external-secrets operator) pulling from a real vault -
# never commit actual secret values to this repo.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: faithfit-secrets
  namespace: faithfit
spec:
  refreshInterval: 1h
  secretStoreRef: { name: faithfit-vault-store, kind: ClusterSecretStore }
  target: { name: faithfit-secrets }
  data:
    - secretKey: YOUVERSION_API_KEY
      remoteRef: { key: faithfit/youversion, property: api_key }
    - secretKey: GLOO_API_KEY
      remoteRef: { key: faithfit/gloo, property: api_key }
    - secretKey: APNS_AUTH_KEY
      remoteRef: { key: faithfit/apns, property: auth_key }
