<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FaithFit</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand"><span class="brand-mark"></span>FaithFit</div>
    <div id="topbar-right" class="muted" style="font-size:0.75rem;"></div>
  </header>
  <main id="main"></main>
  <nav class="tabbar">
    <button data-tab="home"><span class="icon">🏠</span>Home</button>
    <button data-tab="workout"><span class="icon">🏃</span>Train</button>
    <button data-tab="explore"><span class="icon">🧭</span>Explore</button>
    <button data-tab="profile"><span class="icon">👤</span>Profile</button>
  </nav>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/app.js"></script>
</body>
</html>
